<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="login_title">Crypto Analyzer — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=static_version) }}">
  <script src="{{ url_for('static', filename='translations.js', v=static_version) }}"></script>

  <style>
    /* === Только для чекбокса "Запомнить меня" === */
    #remember-container {
      display: flex;
      align-items: center;
      font-size: 14px;
      margin-top: 10px;
      color: #e8e8e8;
    }

    #rememberMe {
      margin-right: 12px;
      width: 16px;
      height: 16px;
      accent-color: #3fa9f5;
    }
  </style>
</head>
<body id="login-page">
  <div style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; align-items: center; gap: 10px;">
    <div class="custom-dropdown" id="languageDropdown">
      <button class="custom-dropdown-toggle" id="languageToggleBtn" type="button">
        <span id="languageToggleText">🌐</span>
      </button>
      <ul class="custom-dropdown-menu" id="languageDropdownMenu">
        <li data-value="uk">Українська</li>
        <li data-value="en">English</li>
        <li data-value="ru" class="selected">Русский</li>
      </ul>
    </div>
  </div>
  
  <div class="login-card">
    <h1 data-i18n="app_title">Crypto Analyzer</h1>
    <div class="login-form">
      <label>
        <span id="emailLabel">Email:</span>
        <input type="text" id="email" placeholder="Введите email" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="none">
      </label>
      <label>
        <span id="passwordLabel">Пароль:</span>
        <input type="password" id="password" placeholder="Введите пароль" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="none">
      </label>

      <div id="remember-container" style="display: flex; align-items: center; font-size: 14px; margin-top: 10px; color: #e8e8e8;">
        <input type="checkbox" id="rememberMe" style="margin-right: 12px !important; width: 16px; height: 16px; accent-color: #3fa9f5; vertical-align: middle; margin: 0;">
        <label for="rememberMe" id="rememberLabel" style="margin: 0; padding: 0; vertical-align: middle; line-height: 16px; display: flex; align-items: center;">Запомнить меня</label>
      </div>

      <button id="loginBtn">Войти</button>
      <p id="errorMsg"></p>
    </div>
  </div>

	  <script>
	// Инициализация языка на странице логина
	let currentLanguage = localStorage.getItem('language') || 'ru';
	
	// Инициализация кастомного дропдауна для языка
	function initLoginCustomDropdown() {
	  const dropdown = document.getElementById('languageDropdown');
	  const toggle = document.getElementById('languageToggleBtn');
	  const menu = document.getElementById('languageDropdownMenu');
	  const toggleText = document.getElementById('languageToggleText');
	  
	  if (!dropdown || !toggle || !menu) return;
	  
	  // Устанавливаем текущий язык
	  const currentLang = localStorage.getItem('language') || 'ru';
	  updateDropdownText(currentLang);
	  
	  // Отмечаем выбранный пункт
	  menu.querySelectorAll('li').forEach(li => {
		if (li.getAttribute('data-value') === currentLang) {
		  li.classList.add('selected');
		} else {
		  li.classList.remove('selected');
		}
	  });
	  
	  // Открытие/закрытие меню
	  toggle.addEventListener('click', (e) => {
		e.stopPropagation();
		menu.classList.toggle('show');
	  });
	  
	  // Закрытие при клике вне
	  document.addEventListener('click', (e) => {
		if (!dropdown.contains(e.target)) {
		  menu.classList.remove('show');
		}
	  });
	  
	  // Выбор языка
	  menu.querySelectorAll('li').forEach(li => {
		li.addEventListener('click', () => {
		  const value = li.getAttribute('data-value');
		  currentLanguage = value;
		  localStorage.setItem('language', value);
		updateLoginTranslations();
		  updateDropdownText(value);
		  menu.classList.remove('show');
		  
		  // Обновляем выбранный пункт
		  menu.querySelectorAll('li').forEach(item => {
			item.classList.remove('selected');
		  });
		  li.classList.add('selected');
		});
	  });
	  
	  function updateDropdownText(lang) {
		const langMap = {
		  'uk': 'UA',
		  'en': 'EN',
		  'ru': 'RU'
		};
		if (toggleText) {
		  toggleText.textContent = langMap[lang] || '🌐';
		}
	  }
	}
	
	function updateLoginTranslations() {
	  const t = translations[currentLanguage] || translations['ru'] || {};
	  
	  // Обновляем тексты
	  const emailLabel = document.getElementById('emailLabel');
	  if (emailLabel) emailLabel.textContent = (t.email || 'Email') + ':';
	  
	  const passwordLabel = document.getElementById('passwordLabel');
	  if (passwordLabel) passwordLabel.textContent = (t.password || 'Пароль') + ':';
	  
	  const loginBtn = document.getElementById('loginBtn');
	  if (loginBtn) loginBtn.textContent = t.login || 'Войти';
	  
	  const rememberLabel = document.getElementById('rememberLabel');
	  if (rememberLabel) rememberLabel.textContent = t.remember_me || 'Запомнить меня';
	  
	  // Обновляем placeholder
	  const emailInput = document.getElementById('email');
	  if (emailInput) emailInput.placeholder = t.email_placeholder || 'Введите email';
	  
	  const passwordInput = document.getElementById('password');
	  if (passwordInput) passwordInput.placeholder = t.password_placeholder || 'Введите пароль';
	}
	
	// Применяем переводы при загрузке
	if (typeof translations !== 'undefined') {
	  updateLoginTranslations();
	}
	
	// Инициализируем кастомный дропдаун
	initLoginCustomDropdown();
	
	const loginBtn = document.getElementById("loginBtn");
	const errorMsg = document.getElementById("errorMsg");
	const rememberMe = document.getElementById("rememberMe");
	const emailInput = document.getElementById("email");
	const passwordInput = document.getElementById("password");

	// Флаги для отслеживания состояния ввода (IME для кириллицы)
	let isComposing = false;
	let isSubmitting = false;
	
	// Обработка событий композиции (IME) для предотвращения зависания при вводе кириллицы
	if (emailInput) {
		emailInput.addEventListener('compositionstart', () => { isComposing = true; });
		emailInput.addEventListener('compositionend', () => { isComposing = false; });
		emailInput.addEventListener('compositionupdate', () => { isComposing = true; });
	}
	
	if (passwordInput) {
		passwordInput.addEventListener('compositionstart', () => { isComposing = true; });
		passwordInput.addEventListener('compositionend', () => { isComposing = false; });
		passwordInput.addEventListener('compositionupdate', () => { isComposing = true; });
	}

	// Автологин при наличии localStorage
	window.addEventListener("load", async () => {
	  try {
		  const res = await fetch("/session_check", { credentials: "include" });
		  const data = await res.json();
		  if (data.logged_in) window.location.href = "/";
	  } catch (e) {
		console.error("Session check failed:", e);
	  }
	});

	// Функция обработки логина
	async function handleLogin() {
	  // Предотвращаем отправку во время ввода кириллицы или повторную отправку
	  if (isComposing || isSubmitting) {
		return;
	  }
	  
	  isSubmitting = true;
	  loginBtn.disabled = true;
	  errorMsg.textContent = "";

	  const email = emailInput.value.trim();
	  const password = passwordInput.value.trim();

	  if (!email || !password) {
		const t = translations[currentLanguage] || translations['ru'] || {};
		errorMsg.textContent = t.login_error_required || "Email и пароль обязательны";
		isSubmitting = false;
		loginBtn.disabled = false;
		return;
	  }

	  try {
		// Кодируем данные в UTF-8 для корректной передачи кириллицы
		const response = await fetch("/api/login", {
		  method: "POST",
		  headers: {
			"Content-Type": "application/json; charset=utf-8"
		  },
		  credentials: "include",
		  body: JSON.stringify({email, password, remember: !!rememberMe && rememberMe.checked, language: currentLanguage})
		});

		const data = await response.json();

		if (response.ok && data.ok) {
		  window.location.href = `/?v=${Date.now()}`;
		} else {
		  const t = translations[currentLanguage] || translations['ru'] || {};
		  errorMsg.textContent = data.error || t.login_error_auth || "Ошибка авторизации";
		  isSubmitting = false;
		  loginBtn.disabled = false;
		}
	  } catch (e) {
		const t = translations[currentLanguage] || translations['ru'] || {};
		errorMsg.textContent = t.login_error_connection || "Ошибка соединения с сервером";
		isSubmitting = false;
		loginBtn.disabled = false;
	  }
	}
	
	loginBtn.addEventListener("click", handleLogin);
	
	// Обработка Enter в полях ввода (только если не идет ввод кириллицы)
	if (emailInput) {
		emailInput.addEventListener("keydown", (e) => {
			if (e.key === "Enter" && !isComposing) {
				e.preventDefault();
				handleLogin();
			}
		});
	}
	
	if (passwordInput) {
		passwordInput.addEventListener("keydown", (e) => {
			if (e.key === "Enter" && !isComposing) {
				e.preventDefault();
				handleLogin();
			}
		});
	}
	</script>
</body>
</html>
